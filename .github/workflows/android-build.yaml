name: "Android Build"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'third-part/**'
      - 'include/**'
      - 'Android.mk'
      - 'Application.mk'
      - 'build.mk'
      - '.github/workflows/android-build.yaml'

jobs:
  android:
    name: Android NDK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true

      - name: Prepare NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27d-linux.zip
          unzip -q android-ndk-r27d-linux.zip
          ln -sf . jni

      - name: Build all ABIs
        run: |
          ./android-ndk-r27d/ndk-build \
            APP_ABI="armeabi-v7a arm64-v8a x86 x86_64" \
            APP_PLATFORM=android-24 \
            -j$(nproc)
          echo "--- libs tree ---"
          find libs -type f | sort
          echo "--- file sizes ---"
          ls -la libs/*/libhev-socks5-tunnel.so

      - name: Upload .so artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libhev-socks5-tunnel-android
          path: libs/*/libhev-socks5-tunnel.so
          if-no-files-found: error
          retention-days: 30
